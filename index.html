<!doctype html>
<html lang="es">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Web App - Inicio</title>
    <link rel="stylesheet" href="/css/bootstrap.min.css" />
    <link
      rel="stylesheet"
      href="https://cdn.datatables.net/1.13.6/css/jquery.dataTables.min.css"
    />
    <link
      rel="shortcut icon"
      href="./assets/images/cactus.ico"
      type="image/x-icon"
    />
  </head>
  <body style="background-color: #f8f9fa">
    <nav class="navbar navbar-expand-lg navbar-dark bg-dark mb-4">
      <div class="container">
        <a class="navbar-brand" href="#">WebApp JS</a>
        <div class="collapse navbar-collapse">
          <ul class="navbar-nav">
            <li class="nav-item">
              <a class="nav-link active" href="index.html">Inicio (Usuarios)</a>
            </li>
            <li class="nav-item">
              <a class="nav-link" href="formulario.html">Registro Nuevo</a>
            </li>
          </ul>
        </div>
      </div>
    </nav>

    <div class="container">
      <h2>Listado de Usuarios Registrados</h2>
      <hr />
      <table id="tablaUsuarios" class="display" style="width: 100%">
        <thead>
          <tr>
            <th>Nombre</th>
            <th>Usuario</th>
            <th>Email</th>
            <th>Sitio Web</th>
          </tr>
        </thead>
        <tbody></tbody>
      </table>
    </div>

    <script src="https://code.jquery.com/jquery-3.7.0.min.js"></script>
    <script src="https://cdn.datatables.net/1.13.6/js/jquery.dataTables.min.js"></script>
    <script>
      $(document).ready(function () {
        // Inicialización de DataTable con datos desde jsonplaceholder
        $("#tablaUsuarios").DataTable({
          ajax: {
            url: "https://jsonplaceholder.typicode.com/users",
            dataSrc: "",
          },
          columns: [
            { data: "name" },
            { data: "username" },
            { data: "email" },
            { data: "website" },
          ],
          // Cambiamos el idioma a español (incluye el botón Buscar)
          language: {
            url: "//cdn.datatables.net/plug-ins/1.13.6/i18n/es-ES.json",
          },
        });
      });
    </script>
  </body>
</html>
