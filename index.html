<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Inicio - DataTables</title>
    <link rel="stylesheet" href="/css/brite.css" />
    <link
      rel="stylesheet"
      href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.13.1/font/bootstrap-icons.min.css"
    />
    <link
      rel="shortcut icon"
      href="./assets/images/cactus.ico"
      type="image/x-icon"
    />
    <link
      rel="stylesheet"
      href="https://cdn.datatables.net/1.13.6/css/jquery.dataTables.min.css"
    />
  </head>

  <body>
    <div class="container">
      <div class="row">
        <div class="col mt-3">
          <a href="index.html">Inicio (DataTables)</a> |
          <a href="formulario.html">Registro Nuevo</a>
          <hr />
        </div>
      </div>
    </div>
    <div class="container">
      <div class="row">
        <div class="col col-3"></div>
        <div class="col col-9">
          <div class="row">
            <div class="col">
              <h3>Usuarios Registrados</h3>
            </div>
          </div>
          <br />

          <table id="tablaUsuarios" class="display" style="width: 100%">
            <thead>
              <tr>
                <th>Nombre</th>
                <th>Usuario</th>
                <th>Email</th>
                <th>Sitio Web</th>
              </tr>
            </thead>
            <tbody></tbody>
          </table>
        </div>
      </div>
    </div>

    <script src="https://code.jquery.com/jquery-3.7.0.min.js"></script>
    <script src="https://cdn.datatables.net/1.13.6/js/jquery.dataTables.min.js"></script>
    <script>
      $(document).ready(function () {
        $("#tablaUsuarios").DataTable({
          ajax: {
            url: "https://jsonplaceholder.typicode.com/users",
            dataSrc: "",
          },
          columns: [
            { data: "name" },
            { data: "username" },
            { data: "email" },
            { data: "website" },
          ],
          language: {
            url: "//cdn.datatables.net/plug-ins/1.13.6/i18n/es-ES.json",
          },
        });
      });
    </script>
  </body>
</html>
