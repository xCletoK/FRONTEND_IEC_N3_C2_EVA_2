<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Formulario Inicial</title>
    <link rel="stylesheet" href="/css/brite.css" />
    <link
      rel="stylesheet"
      href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.13.1/font/bootstrap-icons.min.css"
    />
    <link
      rel="shortcut icon"
      href="./assets/images/cactus.ico"
      type="image/x-icon"
    />
    <link rel="stylesheet" href="./css/estilos_formulario.css" />

    <script src="/js/bootstrap.min.js"></script>
    <script src="./js/procesar_form.js"></script>
  </head>

  <body>
    <div class="container">
      <div class="row">
        <div class="col">
          <br />
          <a href="index.html">Inicio</a> |
          <a href="formulario.html">Registro Nuevo</a> <br /><br />
        </div>
      </div>
    </div>
    <div class="container">
      <div class="row">
        <div class="col col-3"></div>
        <div class="col col-9">
          <form id="miForm" action="" method="post">
            <div class="row">
              <div class="col">
                <h3>Formulario Registro</h3>
              </div>
            </div>
            <br />

            <div class="row">
              <div class="col">
                <label for="input_nombre" class="form-label">Nombre:</label>
                <input
                  type="text"
                  class="form-control"
                  name=""
                  id="input_nombre"
                  placeholder="Ingrese nombre"
                  onchange="validarInput(this)"
                />
                <div
                  class="alert alert-danger"
                  role="alert"
                  id="alertaNombre"
                ></div>
              </div>
              <div class="col">
                <label for="input_usuario" class="form-label">Usuario:</label>
                <input
                  type="text"
                  class="form-control"
                  name=""
                  id="input_usuario"
                  placeholder="Ingrese usuario"
                  onchange="validarInput(this)"
                />
                <div
                  class="alert alert-danger"
                  role="alert"
                  id="alertaUsuario"
                ></div>
              </div>
            </div>
            <br />

            <div class="row">
              <div class="col">
                <label for="input_email" class="form-label">Email:</label>
                <input
                  type="email"
                  class="form-control"
                  name=""
                  id="input_email"
                  placeholder="usuario@servidor.dom"
                  onchange="validarEmail(this)"
                />
                <div
                  class="alert alert-danger"
                  role="alert"
                  id="alertaEmail"
                ></div>
              </div>
            </div>
            <br />

            <div class="row">
              <div class="col">
                <label for="input_fecha" class="form-label"
                  >Fecha Ingreso:</label
                >
                <input
                  type="date"
                  class="form-control"
                  id="input_fecha"
                  name=""
                  onchange="validarInput(this)"
                />
                <div
                  class="alert alert-danger"
                  role="alert"
                  id="alertaFecha"
                ></div>
              </div>

              <div class="col">
                <label for="input_web" class="form-label">Sitio Web:</label>
                <input
                  type="url"
                  class="form-control"
                  id="input_web"
                  name=""
                  placeholder="https://www.ejemplo.com"
                  onchange="validarInput(this)"
                />
                <div
                  class="alert alert-danger"
                  role="alert"
                  id="alertaWeb"
                ></div>
              </div>
            </div>
            <br />

            <br />
            <div class="row">
              <div class="col d-flex justify-content-end">
                <button
                  type="button"
                  onclick="cancelarFormulario()"
                  class="btn btn-secondary me-2"
                >
                  Cancelar
                </button>
                <button
                  type="button"
                  onclick="validarFormulario()"
                  class="btn btn-primary"
                >
                  Enviar
                </button>
              </div>
            </div>
          </form>
        </div>
      </div>
    </div>
  </body>
</html>
